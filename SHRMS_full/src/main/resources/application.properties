# ===================================
# Smart HRMS - Application Properties
# ===================================

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/smart_HRMS?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JSP View Resolver
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Upload directory (change path as needed)
app.upload.dir=uploads

# Logging
logging.level.com.example.SHRMS=DEBUG
logging.level.org.springframework.security=INFO
